# Install as homebrew-abyss/.github/workflows/kinjo.yml and require both jobs
# on protected tap main. This file is documentation until copied to the tap.
name: Check Kinjo formula

on:
  pull_request:
    paths:
      - Formula/kinjo.rb
      - .github/workflows/kinjo.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kinjo-formula-${{ github.ref }}
  cancel-in-progress: true

jobs:
  formula:
    name: Kinjo on ${{ matrix.arch }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            os: macos-15
          - arch: x86_64
            os: macos-15-intel
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Audit the formula
        run: |
          # `brew audit` no longer accepts a file path ("Calling `brew audit
          # [path ...]` is disabled"); it requires a formula name. Register this
          # checkout as the tap so the formula resolves by its qualified name.
          tap_dir="$(brew --repository)/Library/Taps/abbyssoul/homebrew-abyss"
          mkdir -p "$(dirname "$tap_dir")"
          ln -sfn "$GITHUB_WORKSPACE" "$tap_dir"
          brew audit --strict --online abbyssoul/abyss/kinjo

      - name: Install and execute the changed formula
        run: |
          expected="$(sed -nE 's|.*(/releases/download/)v([0-9]+\.[0-9]+\.[0-9]+)/kinjo-.*|\2|p' Formula/kinjo.rb | head -1)"
          test -n "$expected"
          brew install --formula ./Formula/kinjo.rb
          test "$(uname -m)" = "${{ matrix.arch }}"
          kinjo --version | grep -F "$expected"

