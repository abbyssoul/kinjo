sonar.projectKey=abbyssoul_kinjo
sonar.organization=abbyssoul

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=kinjo
#sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=src

# scripts/ holds CI and diagnostic tooling (shell + Python), not shipped product
# code. Exclude it from analysis so it stays out of the crate's quality gate: it
# is not exercised by the Rust test suite (so it would count as 0% new coverage)
# and its low-level process plumbing trips security rules that do not apply here.
sonar.exclusions=scripts/**

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Coverage generated by `cargo llvm-cov --lcov` in the SonarCloud workflow.
sonar.rust.lcov.reportPaths=lcov.info