name: Update Homebrew tap

# Keeps abbyssoul/homebrew-abyss's Formula/kinjo.rb in sync with releases.
# Dispatched by "Publish macOS binaries" once the tarballs the formula needs
# to hash are actually uploaded. It cannot chain off that workflow's
# completion with `workflow_run` instead: the publish workflows are
# themselves dispatched with GITHUB_TOKEN (see prepare-release.yml), and
# activity created with that token emits no workflow-triggering events.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to sync the formula to (e.g. v0.1.4)"
        required: true

permissions:
  contents: read

env:
  GH_TOKEN: ${{ github.token }}
  TAP_REPO: abbyssoul/homebrew-abyss

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve released version
        id: ver
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Compute artifact checksums
        id: sha
        run: |
          set -euo pipefail
          version="${{ steps.ver.outputs.version }}"
          tag="${{ steps.ver.outputs.tag }}"
          base="https://github.com/abbyssoul/kinjo/releases/download/$tag"

          curl -fsSL -o arm64.tar.gz "$base/kinjo-${version}-aarch64-apple-darwin.tar.gz"
          curl -fsSL -o intel.tar.gz "$base/kinjo-${version}-x86_64-apple-darwin.tar.gz"
          curl -fsSL -o source.tar.gz "https://github.com/abbyssoul/kinjo/archive/refs/tags/${tag}.tar.gz"

          {
            echo "arm64=$(sha256sum arm64.tar.gz | cut -d' ' -f1)"
            echo "intel=$(sha256sum intel.tar.gz | cut -d' ' -f1)"
            echo "source=$(sha256sum source.tar.gz | cut -d' ' -f1)"
          } >> "$GITHUB_OUTPUT"

      - name: Update formula in the tap repo
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          ARM64_SHA: ${{ steps.sha.outputs.arm64 }}
          INTEL_SHA: ${{ steps.sha.outputs.intel }}
          SOURCE_SHA: ${{ steps.sha.outputs.source }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${TAP_REPO}.git" tap
          cd tap

          formula="Formula/kinjo.rb"
          sed -i "s/^  version \".*\"/  version \"${VERSION}\"/" "$formula"
          sed -i "s/sha256 \"[a-f0-9]*\" # kinjo-macos-arm64-sha256/sha256 \"${ARM64_SHA}\" # kinjo-macos-arm64-sha256/" "$formula"
          sed -i "s/sha256 \"[a-f0-9]*\" # kinjo-macos-intel-sha256/sha256 \"${INTEL_SHA}\" # kinjo-macos-intel-sha256/" "$formula"
          sed -i "s/sha256 \"[a-f0-9]*\" # kinjo-source-sha256/sha256 \"${SOURCE_SHA}\" # kinjo-source-sha256/" "$formula"

          if git diff --quiet; then
            echo "Formula already up to date; nothing to push."
            exit 0
          fi

          git config user.name "github-actions-release[bot]"
          git config user.email "github-actions-release[bot]@users.noreply.github.com"
          git commit -am "kinjo ${VERSION}"
          git push origin main
