name: Open Homebrew tap update

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      sha:
        required: true
        type: string
    outputs:
      pull-request-url:
        description: "Created or reused Homebrew tap pull request"
        value: ${{ jobs.update-tap.outputs.pull-request-url }}
  workflow_dispatch:
    inputs:
      tag:
        description: "Immutable release tag to sync (for example v0.3.0)"
        required: true
        type: string
      sha:
        description: "Exact commit targeted by the immutable tag"
        required: true
        type: string

permissions:
  contents: read

env:
  TAP_REPO: abbyssoul/homebrew-abyss

jobs:
  update-tap:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment:
      name: release-preparation
      deployment: false
    concurrency:
      group: homebrew-tap-update
      cancel-in-progress: false
    outputs:
      pull-request-url: ${{ steps.pr.outputs.url }}
    # The identity check inspects this (kinjo) repo, while later steps operate on
    # a nested tap/ clone with an explicit --repo. Default gh to this repo so the
    # release-view step does not depend on the cwd's git remote; the --repo flags
    # on the tap steps override this env where they target the tap.
    env:
      GH_REPO: ${{ github.repository }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.sha }}
          persist-credentials: false

      - name: Validate immutable release identity
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          SHA: ${{ inputs.sha }}
        run: |
          case "$TAG" in
            v*) version="${TAG#v}" ;;
            *) echo "::error::release tag must start with v"; exit 1 ;;
          esac
          scripts/release/check-version.sh stable "$version"
          tag_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq .object.sha)"
          test "$tag_sha" = "$SHA" || {
            echo "::error::$TAG targets $tag_sha instead of $SHA"
            exit 1
          }
          test "$(gh release view "$TAG" --json isDraft --jq .isDraft)" = false

      - name: Compute immutable artifact checksums
        id: sha
        env:
          VERSION: ${{ inputs.tag }}
          TAG: ${{ inputs.tag }}
        run: |
          version="${VERSION#v}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/$TAG"
          fetch() { curl --proto '=https' --proto-redir '=https' -fsSL -o "$1" "$2"; }
          fetch arm64.tar.gz "$base/kinjo-${version}-aarch64-apple-darwin.tar.gz"
          fetch intel.tar.gz "$base/kinjo-${version}-x86_64-apple-darwin.tar.gz"
          fetch source.tar.gz "$base/kinjo-${version}.tar.gz"
          {
            echo "arm64=$(sha256sum arm64.tar.gz | cut -d' ' -f1)"
            echo "intel=$(sha256sum intel.tar.gz | cut -d' ' -f1)"
            echo "source=$(sha256sum source.tar.gz | cut -d' ' -f1)"
          } >> "$GITHUB_OUTPUT"

      - name: Mint release App token for the tap
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: homebrew-abyss

      - name: Update and validate the formula
        id: formula
        env:
          VERSION: ${{ inputs.tag }}
          ARM64_SHA: ${{ steps.sha.outputs.arm64 }}
          INTEL_SHA: ${{ steps.sha.outputs.intel }}
          SOURCE_SHA: ${{ steps.sha.outputs.source }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          version="${VERSION#v}"
          git clone "https://github.com/${TAP_REPO}.git" tap
          cd tap
          branch="kinjo/v${version}"
          git checkout -B "$branch" origin/main
          formula="Formula/kinjo.rb"

          ../scripts/release/update-homebrew-formula.sh \
            "$formula" "$version" "$ARM64_SHA" "$INTEL_SHA" "$SOURCE_SHA"

          if git diff --quiet; then
            echo "Formula already contains v${version} and the expected hashes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions-release[bot]"
          git config user.email "github-actions-release[bot]@users.noreply.github.com"
          git add "$formula"
          git commit -m "kinjo ${version}"

          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            git fetch origin "$branch:refs/remotes/origin/$branch"
            if ! git diff --quiet "origin/$branch" HEAD; then
              echo "::error::$branch already exists with different formula content"
              exit 1
            fi
          else
            gh auth setup-git
            git push origin "HEAD:$branch"
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open or reuse the tap PR and wait for checks
        if: steps.formula.outputs.changed == 'true'
        id: pr
        env:
          VERSION: ${{ inputs.tag }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          version="${VERSION#v}"
          branch="kinjo/v${version}"
          state="$(gh pr view "$branch" --repo "$TAP_REPO" --json state --jq .state 2>/dev/null || echo absent)"
          case "$state" in
            OPEN) ;;
            absent)
              gh pr create --repo "$TAP_REPO" --base main --head "$branch" \
                --title "kinjo ${version}" \
                --body "Update Kinjo to immutable release v${version}."
              ;;
            *) echo "::error::tap PR for $branch is $state"; exit 1 ;;
          esac
          url="$(gh pr view "$branch" --repo "$TAP_REPO" --json url --jq .url)"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          # The tap's checks can lag behind PR creation, and
          # `gh pr checks --watch` errors out ("no checks reported") if none
          # exist yet. Wait for at least one check to register before watching.
          for _ in $(seq 1 30); do
            count="$(gh pr checks "$branch" --repo "$TAP_REPO" --json name --jq 'length' 2>/dev/null || echo 0)"
            [ "${count:-0}" -gt 0 ] && break
            sleep 10
          done
          gh pr checks "$branch" --repo "$TAP_REPO" --watch --fail-fast --interval 10
