name: Check and Build Rust project

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_call:
    inputs:
      caller-run-id:
        description: >
          Run ID of the calling workflow. `github.event_name` cannot be used to
          detect a called run: inside a called workflow the github context is the
          caller's, so it is never 'workflow_call'.
        required: false
        type: string
        default: ""
      ref:
        description: >
          Exact commit to check out. Empty (the normal push/PR case) uses the
          triggering ref; a release caller pins its resolved release commit.
        required: false
        type: string
        default: ""

permissions:
  contents: read

# Cancel superseded runs when a branch is pushed again. A called run keys on the
# caller's run instead, so a push to main cannot cancel a release's gate.
concurrency:
  group: ci-test-${{ inputs.caller-run-id || github.ref }}
  cancel-in-progress: ${{ !inputs.caller-run-id }}

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        ref: ${{ inputs.ref }}
        persist-credentials: false
    - name: Check formatting
      run: cargo fmt -- --check

  clippy:
    name: Clippy on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # Lint on every target OS so cfg-gated code paths (e.g. the
        # windows/unix branches in plumber::exec) are not lint-blind.
        os: [ubuntu-24.04, windows-2025, macos-15]

    timeout-minutes: 30

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        ref: ${{ inputs.ref }}
        persist-credentials: false
    - name: Set up build environment
      uses: ./.github/actions/setup
      with:
        install-avahi: ${{ matrix.os == 'ubuntu-24.04' }}
    - name: Run clippy
      run: cargo clippy --locked --all-targets -- -D warnings
    # The zeroconf backend is feature-gated and needs the Avahi client
    # headers, which only the Linux runner installs.
    - name: Run clippy (all features)
      if: matrix.os == 'ubuntu-24.04'
      run: cargo clippy --locked --all-targets --all-features -- -D warnings

  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # Defines the target operating systems
        os: [ubuntu-24.04, windows-2025, macos-15]

    timeout-minutes: 30

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        ref: ${{ inputs.ref }}
        persist-credentials: false

    - name: Set up build environment
      uses: ./.github/actions/setup
      with:
        install-avahi: ${{ matrix.os == 'ubuntu-24.04' }}

    # `cargo test` builds every target it needs, so a separate build step
    # would only duplicate work.
    - name: Run tests
      run: cargo test --locked

    # The zeroconf backend is feature-gated and needs the Avahi client
    # headers, which only the Linux runner installs.
    - name: Run tests (all features)
      if: matrix.os == 'ubuntu-24.04'
      run: cargo test --locked --all-features

  tui-smoke:
    # DIAGNOSTIC: repeat the crash-prone narrow smoke test across tmux versions
    # to test whether the intermittent quit crash tracks the tmux version (3.4 on
    # ubuntu-24.04 vs a source-built 3.5a). Runs the raw path (no wrapper) so the
    # crash is not masked, and counts failures over many iterations.
    name: Smoke ${{ matrix.os }} tmux=${{ matrix.tmux }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            tmux: distro
          - os: ubuntu-22.04
            tmux: distro
          - os: ubuntu-latest
            tmux: distro
          - os: ubuntu-24.04
            tmux: "3.5a"

    env:
      KINJO_TIMEOUT: "15"
      KINJO_COLS: "60"
      KINJO_ROWS: "18"

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        ref: ${{ inputs.ref }}
        persist-credentials: false
    - name: Set up build environment
      uses: ./.github/actions/setup
    - name: Install distro tmux
      run: |
        sudo apt-get update
        sudo apt-get install -y tmux
    - name: Build tmux ${{ matrix.tmux }} from source
      if: matrix.tmux != 'distro'
      run: |
        sudo apt-get install -y build-essential libevent-dev libncurses-dev bison pkg-config
        curl --proto '=https' -fsSLo tmux.tar.gz \
          "https://github.com/tmux/tmux/releases/download/${{ matrix.tmux }}/tmux-${{ matrix.tmux }}.tar.gz"
        tar xzf tmux.tar.gz
        (cd "tmux-${{ matrix.tmux }}" && ./configure && make -j"$(nproc)" && sudo make install)
        hash -r
    - name: Repeat the narrow smoke test and count crashes
      run: |
        echo "using $(command -v tmux): $(tmux -V)"
        fails=0
        for i in $(seq 1 12); do
          if KINJO_SESSION="loop-$i" scripts/smoke-tui.sh > "/tmp/smoke-$i.log" 2>&1; then
            echo "iter $i: pass"
          else
            fails=$((fails + 1))
            echo "iter $i: FAIL"
            tail -3 "/tmp/smoke-$i.log" | sed 's/^/    /'
          fi
        done
        echo "=== $(tmux -V) on ${{ matrix.os }}: ${fails}/12 failed ==="
        test "$fails" -eq 0
    - name: Upload core dumps
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: tui-smoke-crash-${{ github.run_id }}-${{ github.run_attempt }}
        path: |
          /tmp/cores/**
          /tmp/kinjo-app-stderr.log
        if-no-files-found: ignore
        retention-days: 7
