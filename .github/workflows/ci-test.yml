name: Check and Build Rust project

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_call:
    inputs:
      caller-run-id:
        description: >
          Run ID of the calling workflow. `github.event_name` cannot be used to
          detect a called run: inside a called workflow the github context is the
          caller's, so it is never 'workflow_call'.
        required: false
        type: string
        default: ""
      ref:
        description: >
          Exact commit to check out. Empty (the normal push/PR case) uses the
          triggering ref; a release caller pins its resolved release commit.
        required: false
        type: string
        default: ""

permissions:
  contents: read

# Cancel superseded runs when a branch is pushed again. A called run keys on the
# caller's run instead, so a push to main cannot cancel a release's gate.
concurrency:
  group: ci-test-${{ inputs.caller-run-id || github.ref }}
  cancel-in-progress: ${{ !inputs.caller-run-id }}

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        ref: ${{ inputs.ref }}
        persist-credentials: false
    - name: Check formatting
      run: cargo fmt -- --check

  clippy:
    name: Clippy on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # Lint on every target OS so cfg-gated code paths (e.g. the
        # windows/unix branches in plumber::exec) are not lint-blind.
        os: [ubuntu-24.04, windows-2025, macos-15]

    timeout-minutes: 30

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        ref: ${{ inputs.ref }}
        persist-credentials: false
    - name: Set up build environment
      uses: ./.github/actions/setup
      with:
        install-avahi: ${{ matrix.os == 'ubuntu-24.04' }}
    - name: Run clippy
      run: cargo clippy --locked --all-targets -- -D warnings
    # The zeroconf backend is feature-gated and needs the Avahi client
    # headers, which only the Linux runner installs.
    - name: Run clippy (all features)
      if: matrix.os == 'ubuntu-24.04'
      run: cargo clippy --locked --all-targets --all-features -- -D warnings

  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # Defines the target operating systems
        os: [ubuntu-24.04, windows-2025, macos-15]

    timeout-minutes: 30

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        ref: ${{ inputs.ref }}
        persist-credentials: false

    - name: Set up build environment
      uses: ./.github/actions/setup
      with:
        install-avahi: ${{ matrix.os == 'ubuntu-24.04' }}

    # `cargo test` builds every target it needs, so a separate build step
    # would only duplicate work.
    - name: Run tests
      run: cargo test --locked

    # The zeroconf backend is feature-gated and needs the Avahi client
    # headers, which only the Linux runner installs.
    - name: Run tests (all features)
      if: matrix.os == 'ubuntu-24.04'
      run: cargo test --locked --all-features

  tui-smoke:
    name: Smoke-test the rendered TUI
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    env:
      KINJO_TIMEOUT: "15"
      # A fixed path so the crash reporter can find the TUI's captured stderr.
      KINJO_ERRLOG: /tmp/kinjo-app-stderr.log

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        ref: ${{ inputs.ref }}
        persist-credentials: false
    - name: Set up build environment
      uses: ./.github/actions/setup
    - name: Install tmux and gdb
      run: |
        sudo apt-get update
        sudo apt-get install -y tmux gdb
    # Capture a backtrace if the rendered TUI crashes on quit. Cheap to set up;
    # the reporting only runs on failure.
    - name: Enable core dumps
      run: scripts/ci/enable-core-dumps.sh
    - name: Smoke-test the default terminal size
      run: scripts/smoke-tui.sh
    - name: Smoke-test a short, narrow terminal
      env:
        KINJO_COLS: "60"
        KINJO_ROWS: "18"
      run: scripts/smoke-tui.sh
    - name: Report crash backtrace
      if: failure()
      run: scripts/ci/report-crash.sh
    - name: Upload core dumps
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: tui-smoke-crash-${{ github.run_id }}-${{ github.run_attempt }}
        path: |
          /tmp/cores/**
          /tmp/kinjo-app-stderr.log
        if-no-files-found: ignore
        retention-days: 7
