name: Bug report
description: Report something that is broken or behaving unexpectedly.
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the exact command you ran.
      placeholder: |
        1. Run `kinjo ...`
        2. Press ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, install method, package version, and whether Avahi is running.
      placeholder: |
        OS:
        kinjo version:
        Install method:
        Avahi daemon status:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      render: text
  - type: textarea
    id: config
    attributes:
      label: Relevant config
      description: Paste command files or keybinding snippets if relevant.
      render: toml
