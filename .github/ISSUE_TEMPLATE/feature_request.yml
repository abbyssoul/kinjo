name: Feature request
description: Suggest a new capability or improvement.
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like `kinjo` to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workaround or other design you considered?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Discovery
        - Filtering and grouping
        - Actions and commands
        - Keybindings
        - Packaging and installation
        - UI
        - Documentation
        - Other
    validations:
      required: true
